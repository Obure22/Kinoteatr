services:
  cinemaservice:
    container_name: cinemaservice
    build:
      context: .
      dockerfile: ./cinemaService/Dockerfile
    ports:
      - 8090:8090
    depends_on:
      - mongo
    environment:
      SPRING_MONGODB_URI: mongodb://dbuser:dbpassword@mongo:27017/mydatabase?authSource=mydatabase
  mongo:
    image: mongo:latest
    container_name: mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: admin
    ports:
      - 27017:27017
    volumes:
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
  mongo-express:
    container_name: mongo-express
    image: mongo-express
    restart: always
    depends_on:
      - mongo
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://admin:password@mongo:27017/admin?authSource=admin