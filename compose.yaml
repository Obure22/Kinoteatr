services:
  analyzeservice:
    container_name: analyzeservice
    build:
      context: .
      dockerfile: ./analyzeservice/Dockerfile
    expose:
      - 6060
    depends_on:
      - mongo
    environment:
      SPRING_MONGODB_URI: mongodb://dbuser:dbpassword@mongo:27017/mydatabase?authSource=mydatabase
  cinemaservice:
    container_name: cinemaservice
    build:
      context: .
      dockerfile: ./cinemaService/Dockerfile
    expose:
      - 6070
    depends_on:
      - mongo
    environment:
      SPRING_MONGODB_URI: mongodb://dbuser:dbpassword@mongo:27017/mydatabase?authSource=mydatabase
  authservice:
    container_name: authservice
    build:
      context: .
      dockerfile: ./authservice/Dockerfile
    ports:
      - 6080:6080
    depends_on:
      - mongo
      - cinemaservice
      - searchservice
      - analyzeservice
    environment:
      SPRING_MONGODB_URI: mongodb://dbuser:dbpassword@mongo:27017/mydatabase?authSource=mydatabase
  searchservice:
    container_name: searchservice
    build:
      context: .
      dockerfile: ./searchService/Dockerfile
    expose:
      - 6090
    depends_on:
      - mongo
    environment:
      SPRING_MONGODB_URI: mongodb://dbuser:dbpassword@mongo:27017/mydatabase?authSource=mydatabase
  mongo:
    image: mongo:latest
    container_name: mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: admin
    expose:
      - 27017
    volumes:
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
  mongo-express:
    container_name: mongo-express
    image: mongo-express
    restart: always
    depends_on:
      - mongo
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://admin:password@mongo:27017/admin?authSource=admin
      ME_CONFIG_BASICAUTH_USERNAME: admin1
      ME_CONFIG_BASICAUTH_PASSWORD: pass